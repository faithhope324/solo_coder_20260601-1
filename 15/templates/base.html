<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}实时投票系统{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #2d3748; }
        .subtitle { color: #718096; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2d3748; }
        input[type=text], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.2s;
        }
        input[type=text]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { resize: vertical; min-height: 100px; }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }
        .btn-danger { background: linear-gradient(135deg, #e53e3e, #c53030); }
        .btn-danger:hover { box-shadow: 0 8px 20px rgba(229,62,62,0.4); }
        .error { background: #fed7d7; color: #c53030; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
        .success { background: #c6f6d5; color: #22543d; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
        .room-code-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
        }
        .room-code-box .label { font-size: 14px; opacity: 0.9; }
        .room-code-box .code { font-size: 48px; font-weight: 700; letter-spacing: 8px; margin-top: 8px; }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 24px 0;
        }
        .option-btn {
            padding: 20px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            color: #2d3748;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #ebf4ff;
            transform: translateY(-2px);
        }
        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .option-btn.voted {
            border-color: #48bb78;
            background: #c6f6d5;
        }
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 24px;
        }
        .chart-box {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
        }
        .chart-box h3 { margin-bottom: 12px; color: #2d3748; font-size: 16px; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active { background: #c6f6d5; color: #22543d; }
        .status-ended { background: #fed7d7; color: #c53030; }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .info-item {
            background: #f7fafc;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .info-item strong { color: #667eea; }
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            .room-code-box .code { font-size: 36px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
