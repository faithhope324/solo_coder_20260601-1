{% extends "base.html" %}

{% block title %}创建投票 - 实时投票系统{% endblock %}

{% block content %}
<h1>创建新投票</h1>
<p class="subtitle">填写投票信息，创建实时投票房间</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">
    <div class="form-group">
        <label for="title">投票标题</label>
        <input type="text" id="title" name="title" placeholder="例如：最佳编程语言" required>
    </div>
    <div class="form-group">
        <label for="options">选项列表（用逗号分隔）</label>
        <textarea id="options" name="options" placeholder="例如：Python,Java,JavaScript,Go" required></textarea>
        <p class="subtitle" style="margin-top:8px;font-size:13px;">至少 2 个选项</p>
    </div>
    <button type="submit" class="btn">创建投票</button>
</form>
{% endblock %}
