<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主持人 - 实时投票系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-left h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
        }
        .room-code {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 4px;
        }
        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status.active {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .status.ended {
            background: rgba(244, 67, 54, 0.2);
            color: #ef9a9a;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        .participants {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .participants strong {
            color: #64b5f6;
            font-size: 18px;
            margin-left: 6px;
        }
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .end-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .end-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(229, 57, 53, 0.3);
        }
        .end-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .total-votes {
            font-size: 14px;
            color: #aaa;
        }
        .total-votes strong {
            color: #ffd54f;
            font-size: 20px;
        }
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chart-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #ccc;
        }
        .chart-container {
            position: relative;
            height: 320px;
        }
        .vote-options {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .vote-options h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #ccc;
        }
        .option-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }
        .option-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-name {
            font-size: 15px;
            font-weight: 500;
        }
        .option-count {
            background: rgba(102, 126, 234, 0.2);
            color: #9fa8da;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .host-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff9800, #f57c00);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
        }
        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-right { align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1 id="vote-title">加载中... <span class="host-badge">👑 主持人</span></h1>
                <div class="room-info">
                    <span class="room-code" id="room-code-display">{{ room_code }}</span>
                    <span id="vote-status" class="status active">● 投票进行中</span>
                    <span class="participants">👥 在线人数<strong id="participant-count">0</strong></span>
                </div>
            </div>
            <div class="header-right">
                <div class="total-votes">总票数：<strong id="total-votes">0</strong></div>
                <button id="end-btn" class="end-btn" onclick="endVote()">⏹ 结束投票</button>
            </div>
        </div>

        <div class="charts">
            <div class="chart-card">
                <h2>📊 得票比例（饼图）</h2>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>📈 得票数量（条形图）</h2>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <div class="vote-options">
            <h2>🗳️ 选项明细</h2>
            <div class="option-list" id="option-list"></div>
        </div>
    </div>

    <script>
        const ROOM_CODE = '{{ room_code }}';
        const COLORS = [
            '#667eea', '#764ba2', '#f093fb', '#f5576c',
            '#4facfe', '#00f2fe', '#43e97b', '#38f9d7',
            '#fa709a', '#fee140'
        ];

        const socket = io();
        let pieChart = null;
        let barChart = null;
        let currentData = null;
        let voteEnded = false;

        function initCharts() {
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            const barCtx = document.getElementById('barChart').getContext('2d');

            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: COLORS,
                        borderWidth: 2,
                        borderColor: 'rgba(255,255,255,0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#ccc', padding: 12, font: { size: 12 } }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = total ? ((ctx.raw / total) * 100).toFixed(1) : 0;
                                    return `${ctx.label}: ${ctx.raw} 票 (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });

            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '得票数',
                        data: [],
                        backgroundColor: COLORS,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = total ? ((ctx.raw / total) * 100).toFixed(1) : 0;
                                    return `${ctx.raw} 票 (${pct}%)`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { color: '#aaa', stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: { color: '#ddd' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateCharts(data) {
            currentData = data;
            document.getElementById('vote-title').innerHTML =
                data.title + ' <span class="host-badge">👑 主持人</span>';
            document.getElementById('total-votes').textContent = data.total;

            if (data.is_ended) {
                voteEnded = true;
                const statusEl = document.getElementById('vote-status');
                statusEl.textContent = '● 投票已结束';
                statusEl.className = 'status ended';
                document.getElementById('end-btn').disabled = true;
            }

            pieChart.data.labels = data.options;
            pieChart.data.datasets[0].data = data.counts;
            pieChart.update();

            barChart.data.labels = data.options;
            barChart.data.datasets[0].data = data.counts;
            barChart.update();

            const optionList = document.getElementById('option-list');
            optionList.innerHTML = data.options.map((opt, i) => `
                <div class="option-item">
                    <span class="option-name" style="color: ${COLORS[i % COLORS.length]}">● ${opt}</span>
                    <span class="option-count">${data.counts[i]} 票 · ${data.percentages[i]}%</span>
                </div>
            `).join('');
        }

        function endVote() {
            if (voteEnded) return;
            if (!confirm('确定要结束投票吗？结束后将无法再投票。')) return;
            socket.emit('end_vote', { room_code: ROOM_CODE });
        }

        socket.on('connect', function() {
            socket.emit('join_room', { room_code: ROOM_CODE });
        });

        socket.on('vote_results', function(data) {
            if (!pieChart) initCharts();
            updateCharts(data);
        });

        socket.on('vote_ended', function(data) {
            voteEnded = true;
            updateCharts(data);
            alert('投票已结束！');
        });

        socket.on('participant_count', function(data) {
            document.getElementById('participant-count').textContent = data.count;
        });

        socket.on('error', function(data) {
            alert('错误：' + data.message);
        });

        initCharts();
    </script>
</body>
</html>
