<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网约车订单区域分析</title>
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
            min-height: 100vh;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
        }

        .sidebar-header {
            padding: 10px 20px 25px;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }

        .sidebar-header h1 {
            font-size: 20px;
            color: #ecf0f1;
            line-height: 1.4;
        }

        .sidebar-header .subtitle {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-menu li {
            margin-bottom: 5px;
        }

        .nav-menu a {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: #bdc3c7;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            font-size: 15px;
        }

        .nav-menu a:hover {
            background: #34495e;
            color: #fff;
        }

        .nav-menu a.active {
            background: #34495e;
            color: #fff;
            border-left-color: #e74c3c;
        }

        .nav-menu .icon {
            margin-right: 12px;
            font-size: 18px;
        }

        .filter-section {
            padding: 20px;
            border-top: 1px solid #34495e;
            margin-top: 20px;
        }

        .filter-section h3 {
            font-size: 14px;
            color: #95a5a6;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .filter-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-btn {
            padding: 10px 15px;
            background: #34495e;
            color: #ecf0f1;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-align: left;
            font-family: inherit;
        }

        .filter-btn:hover {
            background: #3d566e;
        }

        .filter-btn.active {
            background: #e74c3c;
            color: white;
        }

        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-label {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-card:nth-child(1) .stat-value { color: #e74c3c; }
        .stat-card:nth-child(2) .stat-value { color: #3498db; }
        .stat-card:nth-child(3) .stat-value { color: #2ecc71; }
        .stat-card:nth-child(4) .stat-value { color: #f39c12; }

        .content-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
        }

        .content-card h2 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #ecf0f1;
        }

        .map-container {
            width: 100%;
            height: 650px;
            border-radius: 8px;
            overflow: hidden;
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .chart-container {
            width: 100%;
            height: 600px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .data-table th {
            background: #f8f9fa;
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .data-table td {
            color: #555;
            font-size: 14px;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🚕 网约车订单<br>区域分析系统</h1>
            <div class="subtitle">Ride-Hailing Analytics</div>
        </div>
        <ul class="nav-menu">
            <li><a href="{{ url_for('heatmap', days=current_days) }}" class="{% if current_page == 'heatmap' %}active{% endif %}"><span class="icon">🔥</span>热力地图</a></li>
            <li><a href="{{ url_for('region', days=current_days) }}" class="{% if current_page == 'region' %}active{% endif %}"><span class="icon">📊</span>区域统计</a></li>
            <li><a href="{{ url_for('distance', days=current_days) }}" class="{% if current_page == 'distance' %}active{% endif %}"><span class="icon">📏</span>距离分布</a></li>
        </ul>
        <div class="filter-section">
            <h3>📅 日期筛选</h3>
            <div class="filter-buttons">
                <a href="{{ url_for(current_page, days='7') }}" class="filter-btn {% if current_days == '7' %}active{% endif %}">最近 7 天</a>
                <a href="{{ url_for(current_page, days='30') }}" class="filter-btn {% if current_days == '30' %}active{% endif %}">最近 30 天</a>
                <a href="{{ url_for(current_page, days='all') }}" class="filter-btn {% if current_days == 'all' %}active{% endif %}">全部数据</a>
            </div>
        </div>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
